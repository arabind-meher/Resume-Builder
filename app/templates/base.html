<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resume Builder{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<nav class="bg-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between">
        <h1 class="text-lg font-semibold"><a href="{{ url_for('main.home') }}">Resume Builder</a></h1>

        <div class="space-x-4">
            <a href="{{ url_for('main.home') }}">Home</a>
            <a href="{{ url_for('main.editor') }}">Editor</a>
            <a href="{{ url_for('main.history') }}">History</a>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
</main>

</body>
</html>
